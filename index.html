<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHERINK | Premium Streetwear</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 0;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #888;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DAHERINK</h1>
        <p>PREMIUM HEAVYWEIGHT COTTON APPAREL. <br>DESIGNED FOR THE BOLD.</p>
        <a href="https://daherink.myshopify.com" class="btn">ENTER STORE</a>
    </div>
</body>
</html>
