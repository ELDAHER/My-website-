<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHERINK | Official Linktree</title>
    <style>
        /* Base Reset */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body, html { 
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #ffffff; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* لمنع ظهور أي أشرطة تمرير بسبب الفيديو */
            background-color: #1A1A1A; /* لون احتياطي */
        }

        /* فيديو الخلفية المائي مع الصورة الاحتياطية */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
        }

        /* Glassmorphism Container */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            text-align: center;
            background: rgba(20, 20, 25, 0.4); /* شفافية أعلى لإبراز التموج المائي */
            padding: 45px 25px;
            border-radius: 4px;
            backdrop-filter: blur(15px); /* تضباب قوي لجمالية الزجاج */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Brand Identity */
        .brand-logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5); /* ظل لضمان القراءة فوق الفيديو */
        }

        .tagline {
            font-size: 0.7rem;
            color: #CCC;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Action Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            text-decoration: none;
            color: #000;
            background-color: #fff;
            border: 1px solid #fff;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            background-color: transparent;
            color: #fff;
            transform: scale(1.02);
        }

        .btn-outline {
            background-color: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .btn-outline:hover {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Legal Footer */
        footer {
            margin-top: 50px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline webkit-playsinline preload="auto" poster="poster.png" id="bg-video">
    <source src="hero.mp4" type="video/mp4">
</video>

<div class="wrapper">
    <div class="brand-logo">DAHERINK</div>
    <p class="tagline">Premium Streetwear & Development</p>

    <div class="links-container">
        <a href="https://www.shopify.com" target="_blank" class="btn">Shop on Shopify</a>
        <a href="https://www.etsy.com" target="_blank" class="btn">Shop on Etsy</a>
        <a href="verify.html" class="btn btn-outline" id="btn-verify">Verify Authenticity</a>
    </div>

    <footer>© 2026 DAHERINK. ALL RIGHTS RESERVED.</footer>
</div>

<script>
    document.getElementById('btn-verify').addEventListener('click', function(event) {
        event.preventDefault(); // منع الانتقال الفوري للصفحة
        const btn = this;
        
        // تحويل النص لمنع الارتباك أثناء الانتظار
        btn.innerText = 'LOADING...';
        btn.style.pointerEvents = 'none'; // تعطيل الزر لمنع الضغط المزدوج
        
        // تأخير الانتقال لمدة 3500 مللي ثانية
        setTimeout(() => {
            window.location.href = btn.href;
        }, 3500);
    });
</script>

</body>
</html>
