<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHERINK | Official Linktree</title>
    <style>
        /* Base Reset */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            /* Background Configuration */
            background-image: url('Picsart_26-04-06_16-41-04-669.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            /* Typography and Colors */
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .wrapper {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: rgba(0, 0, 0, 0.65); 
            padding: 45px 25px;
            border-radius: 4px; /* Sharp edges for premium streetwear aesthetic */
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Brand Identity */
        .brand-logo {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Action Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            text-decoration: none;
            color: #000;
            background-color: #fff;
            border: 1px solid #fff;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            background-color: transparent;
            color: #fff;
            transform: scale(1.02);
        }

        .btn-outline {
            background-color: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .btn-outline:hover {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Legal Footer */
        footer {
            margin-top: 50px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-logo">DAHERINK</div>
    <p class="tagline">Premium Streetwear & Development</p>

    <div class="links-container">
        <a href="https://www.shopify.com" target="_blank" class="btn">Shop on Shopify</a>
        <a href="https://www.etsy.com" target="_blank" class="btn">Shop on Etsy</a>
        <a href="https://daherink.com/verify" target="_blank" class="btn btn-outline">Verify Authenticity</a>
    </div>

    <footer>© 2026 DAHERINK. ALL RIGHTS RESERVED.</footer>
</div>

</body>
</html>
