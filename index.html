<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHERINK | Official Linktree</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0f0f0f; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }
        .wrapper {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            text-decoration: none;
            color: #000;
            background-color: #fff;
            border: 1px solid #fff;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: transparent;
            color: #fff;
        }
        .btn-outline {
            background-color: transparent;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-outline:hover {
            border-color: #fff;
        }
        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-logo">DAHERINK</div>
    <p class="tagline">Premium Streetwear & POD Concepts</p>

    <div class="links-container">
        <a href="https://www.shopify.com" target="_blank" class="btn">Shop on Shopify</a>

        <a href="https://www.etsy.com" target="_blank" class="btn">Shop on Etsy</a>

        <a href="https://daherink.com/verify" target="_blank" class="btn btn-outline">Verify Authenticity (Barcode)</a>
    </div>

    <footer>© 2026 DAHERINK. ALL RIGHTS RESERVED.</footer>
</div>

</body>
</html>
